name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test

  binaries:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: burnrate-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            asset: burnrate-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-x64
            asset: burnrate-darwin-x64
            os: macos-latest
          - target: bun-darwin-arm64
            asset: burnrate-darwin-arm64
            os: macos-latest
          - target: bun-windows-x64
            asset: burnrate-windows-x64.exe
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build single-file binary (${{ matrix.target }})
        run: bun run build.ts --compile --target ${{ matrix.target }} --outfile dist/${{ matrix.asset }}
      - name: Compute checksum
        run: |
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256

  npm-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
